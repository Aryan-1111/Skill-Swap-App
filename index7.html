<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Screen</title>
  <link rel="stylesheet" href="style7.css">
</head>
<body>

<div class="phone">

  <!-- Header -->
  <div class="header">
    <span class="back">←</span>
    <h2>Chat Screen</h2>
    <span class="menu">💬</span>
  </div>

  <!-- Chat Area -->
  <div class="chat-area">

    <div class="msg left">
      <b>Alex:</b> Hi, when can we start?
    </div>

    <div class="msg right">
      <b>You:</b> Tomorrow evening works!
    </div>

    <div class="msg right small">
      <b>Alex:</b> Perfect! 👍
    </div>

  </div>

  <!-- Input -->
  <div class="input-box">
    <input type="text" placeholder="Type a message...">
    <button id="send">➤</button>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <div class="nav-item active"><a href="index3.html">🏠<p>Home</p></a></div>
    <div class="nav-item">🔍<p>Explore</p></div>
    <div class="nav-item">💬<p>Chat</p></div>
    <div class="nav-item">👤<p>Profile</p></div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
