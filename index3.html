<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skill App</title>
  <link rel="stylesheet" href="style3.css">
</head>
<body>

<div class="container">
  <h1>Home Screen</h1>

  <!-- Search -->
  <div class="search-box">
    <input type="text" placeholder="Search skills..." id="searchInput">
  </div>

  <!-- Categories -->
  <h2>Categories</h2>
  <div class="categories">
    <a href="index4.html">
    <button class="cat">Coding</button>
    </a>
    
    <button class="cat">Music</button>
    <button class="cat">Cooking</button>
    
  </div>
  

  <!-- Mentors -->
  <h2>Popular Mentors</h2>
  <div class="mentor" data-name="Alex">
    <img src="https://i.pravatar.cc/100?img=1">
    <div>
      <h3>Alex</h3>
      <p>Web Developer</p>
    </div>
    <span>⭐ 4.9</span>
  </div>

  <div class="mentor" data-name="Sara">
    <img src="https://i.pravatar.cc/100?img=5">
    <div>
      <h3>Sara</h3>
      <p>Guitar Instructor</p>
    </div>
    <span>⭐ 4.8</span>
  </div>

  <!-- Nearby -->
  <h2>Nearby Skills</h2>
  <div class="nearby">📍 Video Editing</div>
  <div class="nearby">📍 Graphic Design</div>

</div>

<script src="script3.js"></script>
</body>
</html>
