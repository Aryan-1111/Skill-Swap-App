<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skill India UI Clone</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Topbar -->
<div class="topbar">
    <div>🇮🇳 Government of India</div>
    <div class="right">
        <span>Location</span>
        <span>Screen Reader</span>
    </div>
</div>

<!-- Navbar -->
<nav>
    <div class="logo">
        <h1>Skill India</h1>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Search Skill Courses">
    </div>

    <div class="nav-btns">
        <button class="register">REGISTER</button>
       <a href="index2.html"> <button class="login">LOGIN</button></a>
    </div>
</nav>

<!-- Menu -->
<div class="menu">
    <a href="#">Courses</a>
    <a href="#">Opportunities</a>
    <a href="#">Resources</a>
    <a href="#">Navachar</a>
</div>

<!-- Hero Section -->
<section class="hero">

    <div class="slide slide1 active">
        <div class="left">
            <h2>सिद्ध</h2>
            <p>Achieved a milestone of</p>
        </div>

        <div class="right-text">
            <h1>1Cr</h1>
        </div>
    </div>

    <div class="slide slide2">
        <h1>Learn New Skills</h1>
        <p>Upgrade Yourself With Best Courses</p>
    </div>

    <div class="dots">
        <div class="dot active"></div>
        <div class="dot"></div>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
